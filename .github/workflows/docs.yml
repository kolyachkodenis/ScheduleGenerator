name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Validate documentation
        run: python scripts/check_docs.py
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Validate example datasets
        run: python scripts/validate_dataset.py --require-schema examples/small-school.json
      - name: Test validation rules
        run: python -m unittest discover --start-directory tests --verbose
